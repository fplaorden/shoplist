version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: shoplist_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shoplist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shoplist_secret}
      POSTGRES_DB: ${POSTGRES_DB:-shoplist}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/models/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shoplist}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shoplist_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-shoplist}:${POSTGRES_PASSWORD:-shoplist_secret}@postgres:5432/${POSTGRES_DB:-shoplist}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_changeme}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:4000}
    container_name: shoplist_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
